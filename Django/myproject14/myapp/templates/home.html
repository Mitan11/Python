<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Information</h1>
    <a href="{% url 'add' %}">Add Student</a>
    <a href="{% url 'logout' %}">Logout</a>

    <table border='1'>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Dob</th>
            <th>Action</th>
        </tr>
        {% for data in data %}
            <tr>
                <td>{{data.name}}</td>
                <td>{{data.age}}</td>
                <td>{{data.dob}}</td>
                <td>
                    <a href="{% url 'edit' data.id %}">Edit</a>
                    <a href="{% url 'delete' data.id %}">Delete</a>
                </td>
            </tr>
        {% endfor %}
    </table>
</body>
</html>
