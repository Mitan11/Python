<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Records</h1> <a href="{% url 'add_student' %}">Add Student</a>
    <ul>
        {% for student in data %}
            <li>{{ student.name }} - {{ student.email }} - {{ student.dob }} <a href="{% url 'edit_student' student.id %}">Edit</a> | <a href="{% url 'delete_student' student.id %}">Delete</a></li>
        {% endfor %}
    </ul>
</body>
</html>
