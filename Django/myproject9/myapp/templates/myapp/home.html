<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Records</h1>
    <a href="{% url 'add' %}">Add Student</a>
    <table border="1">
        <tr>
            <th>id</th>
            <th>Name</th>
            <th>Age</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>

        {% for student in data %}

        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.age }}</td>
            <td>{{ student.email }}</td>
            <td>
                <a href="{% url 'edit' student.id %}">Edit</a>
                <a href="{% url 'delete' student.id %}">Delete</a> 
            </td>
        </tr>

        {% endfor %}
        
    </table>
</body>
</html>
